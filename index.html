<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>فرم پذیرش معماران</title>
</head>
<body>
    <div class="card">
        <h1>پذیرش عضویت Archit</h1>
        <form id="admissionForm">
            <label>مقطع تحصیلی:</label>
            <select id="education">
                <option>کارشناسی</option>
                <option>کارشناسی ارشد</option>
                <option>دکتری</option>
            </select>

            <label>نحوه آشنایی:</label>
            <input type="text" id="referral" placeholder="مثال: اینستاگرام">

            <label>علایق (انتخاب ۳ مورد):</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interest" value="کارآموزی"> کارآموزی</label>
                <label><input type="checkbox" name="interest" value="ضوابط"> ضوابط ملی</label>
                <label><input type="checkbox" name="interest" value="رندرینگ"> رندرینگ</label>
            </div>
            
            <button type="button" onclick="submitData()">ثبت نهایی</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // تمام صفحه کردن اپلیکیشن

        function submitData() {
            // جمع‌آوری داده‌ها و ارسال به بات
            const data = {
                education: document.getElementById('education').value,
                referral: document.getElementById('referral').value
            };
            tg.sendData(JSON.stringify(data)); // ارسال به ربات پایتون
        }
    </script>
</body>
</html>
